name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      - run: uv run pytest --cov --cov-report=term-missing -m "not extras and not cloud"

  test-extras:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [otel, mcp, a2a, policy-cedar, eval]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev --extra ${{ matrix.extra }}
      - run: uv run pytest packages/eap-core/tests/extras -v -m extras

  # Note: the [pii] extras test is intentionally not in CI yet — it requires
  # the spaCy `en_core_web_lg` model (~600MB) which can't be auto-downloaded
  # inside a uv-managed venv (no `pip` on PATH). Run locally with:
  #   uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_lg-3.8.0/en_core_web_lg-3.8.0-py3-none-any.whl
  #   uv run pytest packages/eap-core/tests/extras/test_pii_presidio.py
