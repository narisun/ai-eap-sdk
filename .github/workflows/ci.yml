name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      - run: uv run pytest --cov --cov-report=term-missing -m "not extras and not cloud"

  test-extras:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [otel, mcp, a2a, policy-cedar, eval, pii]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev --extra ${{ matrix.extra }}
      # The [pii] extra needs a spaCy language model (~600MB) before Presidio
      # can run. The model isn't on PyPI as a normal dependency; we install
      # it via `spacy download` into the uv-managed venv.
      - name: Download spaCy model for [pii]
        if: matrix.extra == 'pii'
        run: uv run python -m spacy download en_core_web_sm
      - name: Run [pii] tests
        if: matrix.extra == 'pii'
        run: uv run pytest packages/eap-core/tests/extras/test_pii_presidio.py -v
      - name: Run extras tests
        if: matrix.extra != 'pii'
        run: uv run pytest packages/eap-core/tests/extras -v -m extras

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      # pip-audit cannot resolve editable workspace packages (eap-core,
      # eap-cli) on PyPI, so we export the locked third-party deps to a
      # requirements file first and audit that. --no-emit-workspace drops
      # the workspace members; --strict turns warnings (e.g. skipped
      # packages) into failures.
      - name: Export locked third-party deps
        run: uv export --all-packages --no-emit-workspace --format requirements-txt --no-header --quiet > /tmp/audit-reqs.txt
      - name: pip-audit (workspace deps, strict)
        run: uv run --with pip-audit pip-audit --strict -r /tmp/audit-reqs.txt
      - name: bandit (SDK source, Medium+High)
        # `-ll` filters out Low severity (the regex patterns in security.py
        # trip B105 hardcoded-password as a false positive). Inline
        # ``# nosec B701`` annotations document the one intentional
        # autoescape=False in eap_cli/scaffolders/render.py (codegen, not
        # HTML rendering).
        run: uv run --with bandit bandit -r packages/eap-core/src packages/eap-cli/src -ll

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev
      - name: Build wheels + sdists
        run: uv build --all-packages
      - name: twine check
        run: uv run --with twine twine check dist/*
