[project]
name = "eap-cli"
version = "0.5.2"
description = "EAP-Core CLI — scaffolding and ops for agentic AI projects"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "EAP-Core Authors" }]
dependencies = [
    "eap-core",
    "click>=8.1",
    "jinja2>=3.1",
]

[project.scripts]
eap = "eap_cli.main:cli"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eap_cli"]

[tool.uv.sources]
eap-core = { workspace = true }
